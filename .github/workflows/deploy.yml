name: Deploy

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick webp libjpeg-dev libpng-dev libwebp-dev

      - name: Repair problematic image 4
        run: |
          echo "Looking for assets/img/4.*"
          ls -lh assets/img/4.* || true

          echo "Trying to identify image 4"
          identify assets/img/4.* || true

          echo "Re-exporting image 4 to a cleaner JPEG"
          if ls assets/img/4.* 1> /dev/null 2>&1; then
            original_file=$(ls assets/img/4.* | head -n 1)
            convert "$original_file" -auto-orient -strip -resize '2000x2000>' assets/img/4-clean.jpg
            rm -f assets/img/4.*
            mv assets/img/4-clean.jpg assets/img/4.jpg
          fi

          echo "Image 4 after repair:"
          ls -lh assets/img/4.* || true
          identify assets/img/4.* || true

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Ensure Faraday retry middleware
        run: |
          if ! bundle info faraday-retry > /dev/null 2>&1; then
            bundle add faraday-retry
          fi

      - name: Test Jekyll build
        run: bundle exec jekyll build --trace

      - name: Setup deploy options
        id: setup
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ "${GITHUB_REF}" = refs/pull/*/merge ]]; then
            echo "SRC_BRANCH=${GITHUB_HEAD_REF}" >> "$GITHUB_OUTPUT"
            echo "NO_PUSH=--no-push" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" = refs/heads/* ]]; then
            echo "SRC_BRANCH=${GITHUB_REF#refs/heads/}" >> "$GITHUB_OUTPUT"
          fi

          echo "DEPLOY_BRANCH=gh-pages" >> "$GITHUB_OUTPUT"

      - name: Deploy website
        run: |
          printf "y\n" | bin/deploy --verbose ${{ steps.setup.outputs.NO_PUSH }} \
            --src ${{ steps.setup.outputs.SRC_BRANCH }} \
            --deploy ${{ steps.setup.outputs.DEPLOY_BRANCH }}
